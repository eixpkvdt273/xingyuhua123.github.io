<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分切生产订单 - 智能查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: '微软雅黑', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1:before {
            content: '📊';
            font-size: 40px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .search-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .search-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input-group {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .search-filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-tag {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .filter-tag.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-tag:hover {
            border-color: #667eea;
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .results-count {
            font-size: 16px;
            color: #666;
        }

        .results-count span {
            font-weight: bold;
            color: #667eea;
            font-size: 20px;
        }

        .export-btn {
            padding: 10px 20px;
            background: #00C853;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .export-btn:hover {
            background: #00A844;
            transform: translateY(-2px);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: white;
            max-height: 600px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 1800px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px 10px;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }

        tr:hover td {
            background-color: #f5f5ff;
        }

        .highlight {
            background-color: #fff3cd !important;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .loading:after {
            content: '⚡';
            animation: loading 1s infinite;
        }

        @keyframes loading {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .file-info {
            background: #e3f2fd;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #e0a800;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>分切生产订单智能查询系统</h1>

        <!-- 文件信息 -->
        <div class="file-info" id="fileInfo">
            <span>📁 数据文件: <span id="fileName">等待加载...</span></span>
            <span>⏰ 更新时间: <span id="updateTime">-</span></span>
            <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <div class="label">总订单数</div>
                <div class="value" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="label">正常交付</div>
                <div class="value" id="normalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="label">异常订单</div>
                <div class="value" id="abnormalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="label">正常交付率</div>
                <div class="value" id="normalRate">0%</div>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-header">
                <div class="search-input-group">
                    <i>🔍</i>
                    <input type="text" class="search-input" id="searchInput" 
                           placeholder="输入 订单号 / 销售订单 / 物料号 / 物料描述...">
                </div>
                <button class="search-btn" onclick="performSearch()">开始查询</button>
            </div>

            <div class="search-filters" id="searchFilters">
                <span class="filter-tag active" onclick="filterByField('all')">全部字段</span>
                <span class="filter-tag" onclick="filterByField('订单')">订单号</span>
                <span class="filter-tag" onclick="filterByField('销售订单')">销售订单</span>
                <span class="filter-tag" onclick="filterByField('物料')">物料号</span>
                <span class="filter-tag" onclick="filterByField('物料描述')">物料描述</span>
                <span class="filter-tag" onclick="filterByField('责任部门')">责任部门</span>
                <span class="filter-tag" onclick="filterByField('异常原因')">异常原因</span>
            </div>
        </div>

        <!-- 结果信息 -->
        <div class="results-info">
            <div class="results-count">
                找到 <span id="resultCount">0</span> 条记录
            </div>
            <button class="export-btn" onclick="exportToExcel()">
                📥 导出查询结果
            </button>
        </div>

        <!-- 错误信息 -->
        <div class="error-message" id="errorMessage"></div>

        <!-- 表格容器 -->
        <div class="table-container" id="tableContainer">
            <div class="loading">正在加载数据...</div>
        </div>
    </div>

    <script>
        // 全局变量
        let allData = [];
        let filteredData = [];
        let currentFilter = 'all';
        let searchTimeout;

        // 页面加载时读取CSV
        window.onload = function() {
            loadCSV('data.csv');
        };

        // 加载CSV文件
        function loadCSV(filename) {
            showLoading(true);
            document.getElementById('fileName').textContent = filename;
            
            fetch(filename + '?t=' + new Date().getTime()) // 添加时间戳避免缓存
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`无法加载文件: ${filename}`);
                    }
                    return response.text();
                })
                .then(csvText => {
                    parseCSV(csvText);
                    document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
                    showError(false);
                })
                .catch(error => {
                    console.error('加载失败:', error);
                    showError(`❌ 无法加载数据文件: ${error.message}<br>请确保 data.csv 文件存在于相同目录下`);
                    showLoading(false);
                });
        }

        // 刷新数据
        function refreshData() {
            loadCSV('data.csv');
        }

        // 解析CSV
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            if (lines.length === 0) return;

            // 解析表头（第一行）
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').replace(/^\uFEFF/, ''));
            
            // 解析数据行
            allData = [];
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                
                const values = parseCSVLine(lines[i]);
                const row = {};
                
                headers.forEach((header, index) => {
                    if (index < values.length) {
                        row[header] = values[index].trim().replace(/^"|"$/g, '');
                    } else {
                        row[header] = '';
                    }
                });
                
                allData.push(row);
            }

            filteredData = [...allData];
            updateStats();
            renderTable();
            updateResultCount();
            showLoading(false);
        }

        // 解析CSV行（处理引号内的逗号）
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            
            return result;
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('totalOrders').textContent = allData.length;
            
            const normalOrders = allData.filter(row => row['是否正常交付'] === '是').length;
            document.getElementById('normalOrders').textContent = normalOrders;
            
            const abnormalOrders = allData.filter(row => row['是否正常交付'] === '否').length;
            document.getElementById('abnormalOrders').textContent = abnormalOrders;
            
            const normalRate = allData.length > 0 ? (normalOrders / allData.length * 100).toFixed(1) : 0;
            document.getElementById('normalRate').textContent = normalRate + '%';
        }

        // 执行搜索
        function performSearch() {
            const searchText = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (searchText === '') {
                filteredData = [...allData];
            } else {
                filteredData = allData.filter(row => {
                    // 根据当前选择的字段过滤
                    if (currentFilter === 'all') {
                        // 搜索所有字段
                        return Object.values(row).some(value => 
                            value && String(value).toLowerCase().includes(searchText)
                        );
                    } else {
                        // 只搜索指定字段
                        const value = row[currentFilter];
                        return value && String(value).toLowerCase().includes(searchText);
                    }
                });
            }
            
            renderTable();
            updateResultCount();
        }

        // 设置过滤字段
        function filterByField(field) {
            currentFilter = field;
            
            // 更新标签样式
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重新执行搜索
            performSearch();
        }

        // 渲染表格
        function renderTable() {
            const container = document.getElementById('tableContainer');
            
            if (filteredData.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 50px; color: #666;">没有找到匹配的记录</div>';
                return;
            }

            // 获取所有列名（使用第一条数据的键）
            const columns = Object.keys(filteredData[0] || {});
            
            let table = '<table><thead><tr>';
            
            // 表头
            columns.forEach(col => {
                table += `<th>${col}</th>`;
            });
            table += '</tr></thead><tbody>';
            
            // 数据行
            filteredData.forEach((row, rowIndex) => {
                const highlightClass = rowIndex % 2 === 0 ? '' : '';
                table += `<tr class="${highlightClass}">`;
                
                columns.forEach(col => {
                    let value = row[col] || '';
                    
                    // 特殊字段添加样式
                    if (col === '是否正常交付') {
                        if (value === '是') {
                            value = '<span class="badge badge-success">正常</span>';
                        } else if (value === '否') {
                            value = '<span class="badge badge-danger">异常</span>';
                        }
                    } else if (col === '交付天数' && value < 0) {
                        value = `<span style="color: #00C853;">提前 ${Math.abs(value)}天</span>`;
                    } else if (col === '交付天数' && value > 0) {
                        value = `<span style="color: #F44336;">延迟 ${value}天</span>`;
                    } else if (col === '逾期天数' && value > 0) {
                        value = `<span style="color: #F44336;">${value}天</span>`;
                    } else {
                        // 转义HTML特殊字符
                        value = String(value).replace(/&/g, '&amp;')
                                            .replace(/</g, '&lt;')
                                            .replace(/>/g, '&gt;');
                    }
                    
                    table += `<td>${value}</td>`;
                });
                
                table += '</tr>';
            });
            
            table += '</tbody></table>';
            container.innerHTML = table;
        }

        // 更新结果数量
        function updateResultCount() {
            document.getElementById('resultCount').textContent = filteredData.length;
        }

        // 显示/隐藏加载状态
        function showLoading(show) {
            const container = document.getElementById('tableContainer');
            if (show) {
                container.innerHTML = '<div class="loading">正在加载数据...</div>';
            }
        }

        // 显示/隐藏错误信息
        function showError(show, message = '') {
            const errorDiv = document.getElementById('errorMessage');
            if (show) {
                errorDiv.innerHTML = message;
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }

        // 导出查询结果到CSV
        function exportToExcel() {
            if (filteredData.length === 0) {
                alert('没有数据可以导出');
                return;
            }

            const columns = Object.keys(filteredData[0]);
            
            // 创建CSV内容
            let csv = columns.join(',') + '\n';
            
            filteredData.forEach(row => {
                const rowData = columns.map(col => {
                    let value = row[col] || '';
                    // 处理CSV特殊字符
                    value = String(value).replace(/"/g, '""');
                    if (value.includes(',') || value.includes('"') || value.includes('\n')) {
                        value = `"${value}"`;
                    }
                    return value;
                }).join(',');
                csv += rowData + '\n';
            });
            
            // 下载文件
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `查询结果_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        // 添加防抖搜索
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(performSearch, 300);
        });

        // 支持回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
